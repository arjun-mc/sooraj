<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SleekFocus | Smart Job Recruitment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.container{
text-align:center;
max-width:900px;
padding:40px;
animation:fadeIn 1.5s ease;
}

.logo{
font-size:42px;
font-weight:600;
letter-spacing:2px;
margin-bottom:10px;
}

.logo span{
color:#00d4ff;
}

.subtitle{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

.coming{
font-size:48px;
font-weight:600;
margin-bottom:10px;
}

.desc{
font-size:16px;
opacity:0.7;
margin-bottom:40px;
}

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}

.time{
background:rgba(255,255,255,0.08);
padding:20px 25px;
border-radius:12px;
backdrop-filter:blur(10px);
}

.time h2{
font-size:32px;
}

.time p{
font-size:12px;
opacity:0.7;
}

.email-box{
display:flex;
justify-content:center;
margin-top:20px;
}

.email-box input{
padding:14px;
border:none;
border-radius:8px 0 0 8px;
outline:none;
width:250px;
}

.email-box button{
padding:14px 20px;
border:none;
background:#00d4ff;
color:black;
font-weight:600;
border-radius:0 8px 8px 0;
cursor:pointer;
transition:0.3s;
}

.email-box button:hover{
background:#00a8cc;
}

.floating{
position:absolute;
width:200%;
height:200%;
background:url('https://www.transparenttextures.com/patterns/cubes.png');
opacity:0.05;
animation:move 40s linear infinite;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-500px,-500px)}
}

footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="floating"></div>

<div class="container">

<div class="logo">
Sleek<span>Focus</span>
</div>

<div class="subtitle">
Smart Online Recruitment Platform
</div>

<div class="coming">
Launching Soon 🚀
</div>

<div class="desc">
Connecting top talent with the right opportunities.<br>
Our next-generation recruitment platform is on the way.
</div>

<div class="countdown">

<div class="time">
<h2 id="days">00</h2>
<p>DAYS</p>
</div>

<div class="time">
<h2 id="hours">00</h2>
<p>HOURS</p>
</div>

<div class="time">
<h2 id="minutes">00</h2>
<p>MINUTES</p>
</div>

<div class="time">
<h2 id="seconds">00</h2>
<p>SECONDS</p>
</div>

</div>

<div class="email-box">
<input type="email" placeholder="Enter your email">
<button>Notify Me</button>
</div>

</div>

<footer>
© 2026 SleekFocus.in — Online Recruitment Platform
</footer>

<script>

const launchDate = new Date("May 1, 2026 00:00:00").getTime();

setInterval(() => {

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;

},1000);

</script>

</body>
</html>
